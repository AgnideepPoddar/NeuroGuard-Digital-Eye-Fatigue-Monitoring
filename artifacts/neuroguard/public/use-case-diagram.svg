  <!-- ============ KEY «include» / «extend» RELATIONSHIPS ============ -->
  <!-- Receive Fatigue Alert → Detect Face Landmarks (include, routed up) -->
  <path d="M 1210 295 L 1220 295" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow)"/>
  <text x="1180" y="278" text-anchor="middle" font-size="16" fill="#64748b" font-style="italic" font-weight="600">«include»</text>

  <!-- View Analytics Dashboard → Compute EAR (include) -->
  <path d="M 1210 425 L 1220 425" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow)"/>
  <text x="1180" y="413" text-anchor="middle" font-size="16" fill="#64748b" font-style="italic" font-weight="600">«include»</text>

  <!-- Validate Model → Persist Metric (include, routed around) -->
  <path d="M 880 720 Q 1100 760 1220 820" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow)"/>
  <text x="1080" y="755" text-anchor="middle" font-size="16" fill="#64748b" font-style="italic" font-weight="600">«include»</text>

