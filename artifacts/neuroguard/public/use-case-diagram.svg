<?xml version="1.0" encoding="UTF-8"?>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" font-family="'Inter', system-ui, sans-serif">
    <defs>
      <style>
        .actor{fill:none;stroke:#0f172a;stroke-width:2}
        .actor-label{font-size:14px;fill:#0f172a;font-weight:600;text-anchor:middle}
        .system-box{fill:#f8fafc;stroke:#0f172a;stroke-width:2}
        .system-label{font-size:15px;fill:#0f172a;font-weight:700;letter-spacing:1px;text-anchor:middle}
        .uc{fill:#ffffff;stroke:#475569;stroke-width:1.6}
        .uc-primary{fill:#eff6ff;stroke:#2563eb;stroke-width:1.8}
        .uc-secondary{fill:#f0fdf4;stroke:#16a34a;stroke-width:1.6}
        .uc-alert{fill:#fef2f2;stroke:#dc2626;stroke-width:1.8}
        .uc-text{font-size:12.5px;fill:#0f172a;text-anchor:middle;font-weight:500}
        .conn{fill:none;stroke:#475569;stroke-width:1.2}
        .conn-dashed{fill:none;stroke:#64748b;stroke-width:1.2;stroke-dasharray:4 4}
        .stereo{font-size:10.5px;fill:#64748b;text-anchor:middle;font-style:italic}
        .title-text{font-size:20px;font-weight:700;fill:#0f172a}
        .subtitle-text{font-size:12px;fill:#64748b;letter-spacing:1.5px}
      </style>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#475569" stroke-width="1.2"/>
      </marker>
    </defs>

    <!-- Title -->
    <text x="640" y="38" text-anchor="middle" class="title-text">NeuroGuard — Use Case Diagram</text>
    <text x="640" y="60" text-anchor="middle" class="subtitle-text">UML · ACTOR INTERACTIONS &amp; SYSTEM CAPABILITIES</text>

    <!-- ============== ACTOR (User) ============== -->
    <g transform="translate(110, 380)">
      <!-- head -->
      <circle cx="0" cy="-50" r="18" class="actor"/>
      <!-- body -->
      <line x1="0" y1="-32" x2="0" y2="20" class="actor"/>
      <!-- arms -->
      <line x1="-26" y1="-12" x2="26" y2="-12" class="actor"/>
      <!-- legs -->
      <line x1="0" y1="20" x2="-22" y2="58" class="actor"/>
      <line x1="0" y1="20" x2="22" y2="58" class="actor"/>
      <text x="0" y="84" class="actor-label">User</text>
      <text x="0" y="102" class="actor-label" font-size="11" fill="#64748b" font-weight="400">(Driver / Developer / General)</text>
    </g>

    <!-- ============== SYSTEM BOUNDARY ============== -->
    <g>
      <rect x="260" y="100" width="980" height="640" rx="12" class="system-box"/>
      <text x="750" y="128" class="system-label">NeuroGuard System</text>
    </g>

    <!-- ============== USE CASES ============== -->
    <!-- UC1: Start Monitoring Session (primary) -->
    <g transform="translate(420, 200)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc-primary"/>
      <text x="0" y="-2" class="uc-text">Start Monitoring</text>
      <text x="0" y="14" class="uc-text">Session</text>
    </g>

    <!-- UC2: Select Inference Model -->
    <g transform="translate(720, 200)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc"/>
      <text x="0" y="-2" class="uc-text">Select Inference</text>
      <text x="0" y="14" class="uc-text">Model</text>
    </g>

    <!-- UC3: View Live Metrics (primary) -->
    <g transform="translate(420, 320)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc-primary"/>
      <text x="0" y="-2" class="uc-text">View Live</text>
      <text x="0" y="14" class="uc-text">Metrics</text>
    </g>

    <!-- UC4: Receive Fatigue Alert (alert) -->
    <g transform="translate(720, 320)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc-alert"/>
      <text x="0" y="-2" class="uc-text">Receive Fatigue</text>
      <text x="0" y="14" class="uc-text">Alert</text>
    </g>

    <!-- UC5: End Session -->
    <g transform="translate(420, 440)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc"/>
      <text x="0" y="4" class="uc-text">End Session</text>
    </g>

    <!-- UC6: View Session History -->
    <g transform="translate(720, 440)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc"/>
      <text x="0" y="-2" class="uc-text">View Session</text>
      <text x="0" y="14" class="uc-text">History</text>
    </g>

    <!-- UC7: View Analytics Dashboard -->
    <g transform="translate(420, 560)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc"/>
      <text x="0" y="-2" class="uc-text">View Analytics</text>
      <text x="0" y="14" class="uc-text">Dashboard</text>
    </g>

    <!-- UC8: Delete Session -->
    <g transform="translate(720, 560)">
      <ellipse cx="0" cy="0" rx="118" ry="34" class="uc"/>
      <text x="0" y="4" class="uc-text">Delete Session</text>
    </g>

    <!-- ============== INCLUDED USE CASES (system internals) ============== -->
    <!-- Compute EAR (secondary, included from View Live Metrics) -->
    <g transform="translate(1050, 270)">
      <ellipse cx="0" cy="0" rx="100" ry="28" class="uc-secondary"/>
      <text x="0" y="4" class="uc-text">Compute EAR</text>
    </g>
    <!-- Compute PERCLOS -->
    <g transform="translate(1050, 340)">
      <ellipse cx="0" cy="0" rx="100" ry="28" class="uc-secondary"/>
      <text x="0" y="4" class="uc-text">Compute PERCLOS</text>
    </g>
    <!-- Persist Metric -->
    <g transform="translate(1050, 410)">
      <ellipse cx="0" cy="0" rx="100" ry="28" class="uc-secondary"/>
      <text x="0" y="4" class="uc-text">Persist Metric</text>
    </g>
    <!-- Detect Face Landmarks -->
    <g transform="translate(1050, 200)">
      <ellipse cx="0" cy="0" rx="100" ry="28" class="uc-secondary"/>
      <text x="0" y="-2" class="uc-text">Detect Face</text>
      <text x="0" y="12" class="uc-text">Landmarks</text>
    </g>

    <!-- ============== ACTOR → USE CASE LINES ============== -->
    <line x1="138" y1="370" x2="302" y2="208" class="conn"/>
    <line x1="138" y1="375" x2="302" y2="320" class="conn"/>
    <line x1="138" y1="385" x2="302" y2="440" class="conn"/>
    <line x1="138" y1="395" x2="602" y2="320" class="conn"/>
    <line x1="138" y1="400" x2="602" y2="440" class="conn"/>
    <line x1="138" y1="405" x2="302" y2="560" class="conn"/>
    <line x1="138" y1="410" x2="602" y2="560" class="conn"/>

    <!-- ============== INCLUDE / EXTEND RELATIONSHIPS ============== -->
    <!-- Start Monitoring «include» Select Inference Model -->
    <line x1="538" y1="200" x2="602" y2="200" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="570" y="190" class="stereo">«include»</text>

    <!-- View Live Metrics «include» Detect Face Landmarks -->
    <path d="M 538 312 Q 800 250 950 200" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="780" y="240" class="stereo">«include»</text>

    <!-- View Live Metrics «include» Compute EAR -->
    <path d="M 538 318 Q 800 290 950 270" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="780" y="288" class="stereo">«include»</text>

    <!-- View Live Metrics «include» Compute PERCLOS -->
    <line x1="538" y1="324" x2="950" y2="340" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="780" y="324" class="stereo">«include»</text>

    <!-- View Live Metrics «include» Persist Metric -->
    <path d="M 538 332 Q 800 380 950 410" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="780" y="378" class="stereo">«include»</text>

    <!-- View Live Metrics «extend» Receive Fatigue Alert -->
    <line x1="538" y1="320" x2="602" y2="320" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="570" y="310" class="stereo">«extend»</text>

    <!-- View Session History «extend» Delete Session -->
    <line x1="720" y1="474" x2="720" y2="526" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="752" y="504" class="stereo">«extend»</text>

    <!-- View Session History «include» View Analytics Dashboard -->
    <path d="M 602 458 Q 500 510 538 545" class="conn-dashed" marker-end="url(#arrow)"/>
    <text x="540" y="510" class="stereo">«include»</text>

    <!-- ============== LEGEND ============== -->
    <g transform="translate(290, 700)">
      <rect x="-10" y="-22" width="940" height="32" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <ellipse cx="20" cy="-6" rx="14" ry="9" class="uc-primary"/>
      <text x="42" y="-2" font-size="12" fill="#475569">Primary flow</text>

      <ellipse cx="155" cy="-6" rx="14" ry="9" class="uc-alert"/>
      <text x="177" y="-2" font-size="12" fill="#475569">Alert / safety-critical</text>

      <ellipse cx="335" cy="-6" rx="14" ry="9" class="uc-secondary"/>
      <text x="357" y="-2" font-size="12" fill="#475569">Internal (system-only)</text>

      <line x1="495" y1="-6" x2="525" y2="-6" stroke="#475569" stroke-width="1.2"/>
      <text x="535" y="-2" font-size="12" fill="#475569">Association</text>

      <line x1="635" y1="-6" x2="665" y2="-6" stroke-dasharray="4 4" stroke="#64748b" stroke-width="1.2"/>
      <text x="675" y="-2" font-size="12" fill="#475569">«include» / «extend»</text>
    </g>
  </svg>