  <line x1="580" y1="305" x2="620" y2="305" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="600" y="293" text-anchor="middle" font-size="16" fill="#64748b" font-style="italic" font-weight="600">«include»</text>
  <g>
