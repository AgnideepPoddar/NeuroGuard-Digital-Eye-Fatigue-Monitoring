  <line x1="240" y1="200" x2="1480" y2="200" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="6 5" opacity="0.6"/>
  <text x="260" y="232" font-size="22" font-weight="800" fill="#2563eb" letter-spacing="2.5" opacity="0.9">USER LANE</text>

  <rect x="240" y="585" width="1240" height="380" fill="#7c3aed" opacity="0.05"/>
