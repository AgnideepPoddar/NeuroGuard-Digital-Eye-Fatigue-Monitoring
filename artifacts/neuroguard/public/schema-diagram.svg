<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" font-family="'Inter', system-ui, sans-serif">
  <rect width="1500" height="1500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="750" y="70" text-anchor="middle" font-size="42" font-weight="800" fill="#0f172a">NeuroGuard — Database Schema</text>
  <text x="750" y="112" text-anchor="middle" font-size="22" fill="#64748b" letter-spacing="3" font-weight="600">POSTGRESQL  ·  DRIZZLE ORM  ·  CROW'S-FOOT NOTATION</text>

  <!-- ============ SESSIONS TABLE (top center) ============ -->
  <g>
    <rect x="485" y="155" width="540" height="600" rx="12" fill="#0f172a" opacity="0.07"/>
    <rect x="480" y="150" width="540" height="600" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <path d="M 480 162 a 12 12 0 0 1 12 -12 h 516 a 12 12 0 0 1 12 12 v 64 h -540 z" fill="#7c3aed"/>
    <text x="750" y="198" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="0.6">sessions</text>

    <!-- id PK -->
    <line x1="480" y1="225" x2="1020" y2="225" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="262" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="800" fill="#15803d">id</text>
    <text x="780" y="262" text-anchor="end" font-size="18" font-weight="800" fill="#15803d">«PK»</text>
    <text x="990" y="262" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">SERIAL</text>

    <!-- user_name -->
    <line x1="480" y1="278" x2="1020" y2="278" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="315" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">user_name</text>
    <text x="990" y="315" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">VARCHAR</text>

    <!-- session_type -->
    <line x1="480" y1="331" x2="1020" y2="331" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="368" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">session_type</text>
    <text x="990" y="368" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">ENUM</text>

    <!-- model_type -->
    <line x1="480" y1="384" x2="1020" y2="384" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="421" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">model_type</text>
    <text x="990" y="421" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">ENUM</text>

    <!-- status -->
    <line x1="480" y1="437" x2="1020" y2="437" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="474" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">status</text>
    <text x="990" y="474" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">ENUM</text>

    <!-- started_at -->
    <line x1="480" y1="490" x2="1020" y2="490" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="527" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">started_at</text>
    <text x="990" y="527" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">TIMESTAMPTZ</text>

    <!-- ended_at -->
    <line x1="480" y1="543" x2="1020" y2="543" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="580" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">ended_at</text>
    <text x="990" y="580" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">TIMESTAMPTZ</text>

    <!-- total_alerts -->
    <line x1="480" y1="596" x2="1020" y2="596" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="633" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">total_alerts</text>
    <text x="990" y="633" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">INTEGER</text>

    <!-- avg_ear -->
    <line x1="480" y1="649" x2="1020" y2="649" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="686" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">avg_ear</text>
    <text x="990" y="686" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>

    <!-- avg_perclos -->
    <line x1="480" y1="702" x2="1020" y2="702" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="739" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">avg_perclos</text>
    <text x="990" y="739" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>
  </g>

  <!-- ============ FATIGUE_METRICS TABLE (bottom-left) ============ -->
  <g>
    <rect x="55" y="855" width="540" height="445" rx="12" fill="#0f172a" opacity="0.07"/>
    <rect x="50" y="850" width="540" height="445" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
    <path d="M 50 862 a 12 12 0 0 1 12 -12 h 516 a 12 12 0 0 1 12 12 v 64 h -540 z" fill="#10b981"/>
    <text x="320" y="898" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="0.6">fatigue_metrics</text>

    <line x1="50" y1="925" x2="590" y2="925" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="962" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="800" fill="#15803d">id</text>
    <text x="350" y="962" text-anchor="end" font-size="18" font-weight="800" fill="#15803d">«PK»</text>
    <text x="560" y="962" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">SERIAL</text>

    <line x1="50" y1="978" x2="590" y2="978" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="1015" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="800" fill="#c2410c">session_id</text>
    <text x="350" y="1015" text-anchor="end" font-size="18" font-weight="800" fill="#c2410c">«FK»</text>
    <text x="560" y="1015" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">INTEGER</text>

    <line x1="50" y1="1031" x2="590" y2="1031" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="1068" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">ear</text>
    <text x="560" y="1068" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>

    <line x1="50" y1="1084" x2="590" y2="1084" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="1121" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">perclos</text>
    <text x="560" y="1121" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>

    <line x1="50" y1="1137" x2="590" y2="1137" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="1174" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">blink_rate</text>
    <text x="560" y="1174" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>

    <line x1="50" y1="1190" x2="590" y2="1190" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="1227" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">fatigue_state</text>
    <text x="560" y="1227" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">ENUM</text>

    <line x1="50" y1="1243" x2="590" y2="1243" stroke="#e2e8f0" stroke-width="1"/>
    <text x="80" y="1280" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">timestamp</text>
    <text x="560" y="1280" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">TIMESTAMPTZ</text>
  </g>

  <!-- ============ ALERTS TABLE (bottom-right) ============ -->
  <g>
    <rect x="915" y="855" width="540" height="445" rx="12" fill="#0f172a" opacity="0.07"/>
    <rect x="910" y="850" width="540" height="445" rx="12" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <path d="M 910 862 a 12 12 0 0 1 12 -12 h 516 a 12 12 0 0 1 12 12 v 64 h -540 z" fill="#f97316"/>
    <text x="1180" y="898" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="0.6">alerts</text>

    <line x1="910" y1="925" x2="1450" y2="925" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="962" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="800" fill="#15803d">id</text>
    <text x="1210" y="962" text-anchor="end" font-size="18" font-weight="800" fill="#15803d">«PK»</text>
    <text x="1420" y="962" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">SERIAL</text>

    <line x1="910" y1="978" x2="1450" y2="978" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="1015" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="800" fill="#c2410c">session_id</text>
    <text x="1210" y="1015" text-anchor="end" font-size="18" font-weight="800" fill="#c2410c">«FK»</text>
    <text x="1420" y="1015" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">INTEGER</text>

    <line x1="910" y1="1031" x2="1450" y2="1031" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="1068" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">alert_type</text>
    <text x="1420" y="1068" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">ENUM</text>

    <line x1="910" y1="1084" x2="1450" y2="1084" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="1121" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">message</text>
    <text x="1420" y="1121" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">TEXT</text>

    <line x1="910" y1="1137" x2="1450" y2="1137" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="1174" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">ear</text>
    <text x="1420" y="1174" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>

    <line x1="910" y1="1190" x2="1450" y2="1190" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="1227" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">perclos</text>
    <text x="1420" y="1227" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">REAL</text>

    <line x1="910" y1="1243" x2="1450" y2="1243" stroke="#e2e8f0" stroke-width="1"/>
    <text x="940" y="1280" font-family="'JetBrains Mono','SF Mono',monospace" font-size="22" font-weight="600" fill="#0f172a">timestamp</text>
    <text x="1420" y="1280" text-anchor="end" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700" fill="#1e3a8a">TIMESTAMPTZ</text>
  </g>

  <!-- ============ RELATIONSHIP LINES (crow's-foot) ============ -->
  <!-- Sessions → fatigue_metrics (left) -->
  <path d="M 580 750 L 580 805 L 320 805 L 320 850" stroke="#475569" stroke-width="2.6" fill="none"/>
  <!-- "one" notation at sessions side -->
  <line x1="565" y1="765" x2="595" y2="765" stroke="#475569" stroke-width="3"/>
  <!-- crow's-foot at fatigue_metrics side (above table top) -->
  <g transform="translate(320, 850)">
    <line x1="-18" y1="0" x2="0" y2="-25" stroke="#475569" stroke-width="2.6"/>
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#475569" stroke-width="2.6"/>
    <line x1="18" y1="0" x2="0" y2="-25" stroke="#475569" stroke-width="2.6"/>
  </g>
  <!-- Label -->
  <g transform="translate(150, 800)">
    <rect x="-20" y="-30" width="280" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
    <text x="120" y="0" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">1 : N  records</text>
    <text x="120" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#64748b" font-style="italic">ON DELETE CASCADE</text>
  </g>

  <!-- Sessions → alerts (right) -->
  <path d="M 920 750 L 920 805 L 1180 805 L 1180 850" stroke="#475569" stroke-width="2.6" fill="none"/>
  <line x1="905" y1="765" x2="935" y2="765" stroke="#475569" stroke-width="3"/>
  <g transform="translate(1180, 850)">
    <line x1="-18" y1="0" x2="0" y2="-25" stroke="#475569" stroke-width="2.6"/>
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#475569" stroke-width="2.6"/>
    <line x1="18" y1="0" x2="0" y2="-25" stroke="#475569" stroke-width="2.6"/>
  </g>
  <g transform="translate(1230, 800)">
    <rect x="-20" y="-30" width="280" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
    <text x="120" y="0" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">1 : N  triggers</text>
    <text x="120" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#64748b" font-style="italic">ON DELETE CASCADE</text>
  </g>

  <!-- ============ LEGEND (bottom) ============ -->
  <g transform="translate(70, 1390)">
    <rect x="0" y="0" width="1360" height="70" rx="35" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
    <text x="40" y="44" font-size="22" font-weight="800" fill="#15803d">«PK»</text>
    <text x="110" y="44" font-size="22" font-weight="600" fill="#334155">Primary Key</text>
    <text x="290" y="44" font-size="22" font-weight="800" fill="#c2410c">«FK»</text>
    <text x="360" y="44" font-size="22" font-weight="600" fill="#334155">Foreign Key</text>
    <line x1="540" y1="35" x2="586" y2="35" stroke="#475569" stroke-width="2.6"/>
    <line x1="586" y1="22" x2="586" y2="48" stroke="#475569" stroke-width="3"/>
    <text x="606" y="44" font-size="22" font-weight="600" fill="#334155">"One" side</text>
    <g transform="translate(770, 35)">
      <line x1="-22" y1="0" x2="0" y2="-12" stroke="#475569" stroke-width="2.6"/>
      <line x1="-22" y1="0" x2="0" y2="0" stroke="#475569" stroke-width="2.6"/>
      <line x1="-22" y1="0" x2="0" y2="12" stroke="#475569" stroke-width="2.6"/>
    </g>
    <text x="790" y="44" font-size="22" font-weight="600" fill="#334155">"Many" side (crow's-foot)</text>
    <text x="1180" y="44" font-size="22" font-weight="800" fill="#0f172a">1 : N</text>
    <text x="1244" y="44" font-size="22" font-weight="600" fill="#334155">Cardinality</text>
  </g>
</svg>
