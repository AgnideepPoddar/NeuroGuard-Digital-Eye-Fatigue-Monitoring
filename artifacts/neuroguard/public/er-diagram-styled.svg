<?xml version="1.0" encoding="UTF-8"?>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="'Inter', system-ui, sans-serif">
    <defs>
      <style>
        .ent-body{fill:#ffffff;stroke-width:2}
        .field{font-size:13px;fill:#334155;font-family:'JetBrains Mono','SF Mono',monospace}
        .ftype{font-size:13px;fill:#64748b;font-family:'JetBrains Mono','SF Mono',monospace}
        .ent-title{font-size:18px;font-weight:700;fill:#ffffff;letter-spacing:0.5px}
        .conn{fill:none;stroke:#94a3b8;stroke-width:1.6}
        .legend-text{font-size:12px;fill:#475569}
        .title-text{font-size:20px;font-weight:700;fill:#0f172a}
        .subtitle-text{font-size:12px;fill:#64748b;letter-spacing:1.5px}
      </style>
    </defs>

    <!-- Background subtle texture -->
    <rect width="1100" height="760" fill="#f8fafc"/>

    <!-- Title -->
    <text x="550" y="38" text-anchor="middle" class="title-text">NeuroGuard — Entity Relationship Diagram</text>
    <text x="550" y="60" text-anchor="middle" class="subtitle-text">REAL-TIME EYE-FATIGUE MONITORING SYSTEM</text>

    <!-- ============== SESSION (top center) — purple ============== -->
    <g>
      <!-- Body -->
      <rect x="390" y="100" width="320" height="240" rx="14" class="ent-body" stroke="#a855f7"/>
      <!-- Header -->
      <rect x="390" y="100" width="320" height="48" rx="14" fill="#a855f7"/>
      <rect x="390" y="130" width="320" height="18" fill="#a855f7"/>
      <!-- Icon (calendar/play) -->
      <g transform="translate(408, 114)">
        <rect x="0" y="2" width="22" height="22" rx="4" fill="#ffffff" opacity="0.25"/>
        <path d="M5 9 L5 19 L17 14 Z" fill="#ffffff"/>
      </g>
      <text x="442" y="131" class="ent-title">Session</text>
      <!-- Fields -->
      <g transform="translate(408, 170)">
        <text x="0" y="0" fill="#f59e0b" font-size="14">⚷</text><text x="18" y="0" class="field">session_id</text><text x="284" y="0" text-anchor="end" class="ftype">: int</text>
        <text x="18" y="22" class="field">user_name</text><text x="284" y="22" text-anchor="end" class="ftype">: string</text>
        <text x="18" y="44" class="field">session_type</text><text x="284" y="44" text-anchor="end" class="ftype">: enum</text>
        <text x="18" y="66" class="field">model_type</text><text x="284" y="66" text-anchor="end" class="ftype">: enum</text>
        <text x="18" y="88" class="field">status</text><text x="284" y="88" text-anchor="end" class="ftype">: enum</text>
        <text x="18" y="110" class="field">started_at</text><text x="284" y="110" text-anchor="end" class="ftype">: timestamp</text>
        <text x="18" y="132" class="field">ended_at</text><text x="284" y="132" text-anchor="end" class="ftype">: timestamp</text>
      </g>
    </g>

    <!-- ============== FATIGUE METRIC (bottom left) — emerald ============== -->
    <g>
      <rect x="60" y="450" width="320" height="252" rx="14" class="ent-body" stroke="#10b981"/>
      <rect x="60" y="450" width="320" height="48" rx="14" fill="#10b981"/>
      <rect x="60" y="480" width="320" height="18" fill="#10b981"/>
      <g transform="translate(78, 464)">
        <circle cx="11" cy="13" r="11" fill="#ffffff" opacity="0.25"/>
        <path d="M3 13 Q11 5 19 13 Q11 21 3 13 Z" fill="none" stroke="#ffffff" stroke-width="1.6"/>
        <circle cx="11" cy="13" r="3" fill="#ffffff"/>
      </g>
      <text x="112" y="481" class="ent-title">FatigueMetric</text>
      <g transform="translate(78, 520)">
        <text x="0" y="0" fill="#f59e0b" font-size="14">⚷</text><text x="18" y="0" class="field">metric_id</text><text x="284" y="0" text-anchor="end" class="ftype">: int</text>
        <text x="0" y="22" fill="#3b82f6" font-size="13">⚭</text><text x="18" y="22" class="field">session_id</text><text x="284" y="22" text-anchor="end" class="ftype">: int (FK)</text>
        <text x="18" y="44" class="field">ear</text><text x="284" y="44" text-anchor="end" class="ftype">: float</text>
        <text x="18" y="66" class="field">perclos</text><text x="284" y="66" text-anchor="end" class="ftype">: float</text>
        <text x="18" y="88" class="field">blink_rate</text><text x="284" y="88" text-anchor="end" class="ftype">: float</text>
        <text x="18" y="110" class="field">fatigue_state</text><text x="284" y="110" text-anchor="end" class="ftype">: enum</text>
        <text x="18" y="132" class="field">timestamp</text><text x="284" y="132" text-anchor="end" class="ftype">: timestamp</text>
      </g>
    </g>

    <!-- ============== ALERT (bottom right) — orange ============== -->
    <g>
      <rect x="720" y="450" width="320" height="252" rx="14" class="ent-body" stroke="#f97316"/>
      <rect x="720" y="450" width="320" height="48" rx="14" fill="#f97316"/>
      <rect x="720" y="480" width="320" height="18" fill="#f97316"/>
      <g transform="translate(738, 464)">
        <path d="M11 2 L21 22 L1 22 Z" fill="#ffffff" opacity="0.25"/>
        <path d="M11 4 L20 21 L2 21 Z" fill="none" stroke="#ffffff" stroke-width="1.6"/>
        <line x1="11" y1="10" x2="11" y2="16" stroke="#ffffff" stroke-width="1.8"/>
        <circle cx="11" cy="19" r="1" fill="#ffffff"/>
      </g>
      <text x="772" y="481" class="ent-title">Alert</text>
      <g transform="translate(738, 520)">
        <text x="0" y="0" fill="#f59e0b" font-size="14">⚷</text><text x="18" y="0" class="field">alert_id</text><text x="284" y="0" text-anchor="end" class="ftype">: int</text>
        <text x="0" y="22" fill="#3b82f6" font-size="13">⚭</text><text x="18" y="22" class="field">session_id</text><text x="284" y="22" text-anchor="end" class="ftype">: int (FK)</text>
        <text x="18" y="44" class="field">alert_type</text><text x="284" y="44" text-anchor="end" class="ftype">: enum</text>
        <text x="18" y="66" class="field">message</text><text x="284" y="66" text-anchor="end" class="ftype">: string</text>
        <text x="18" y="88" class="field">ear</text><text x="284" y="88" text-anchor="end" class="ftype">: float</text>
        <text x="18" y="110" class="field">perclos</text><text x="284" y="110" text-anchor="end" class="ftype">: float</text>
        <text x="18" y="132" class="field">timestamp</text><text x="284" y="132" text-anchor="end" class="ftype">: timestamp</text>
      </g>
    </g>

    <!-- ============== Relationships ============== -->
    <!-- Session → FatigueMetric (1 — N) -->
    <path d="M 480 340 L 480 400 L 220 400 L 220 445" class="conn"/>
    <!-- "one" notation at session end (vertical bar) -->
    <line x1="475" y1="340" x2="485" y2="340" stroke="#94a3b8" stroke-width="1.6"/>
    <!-- "many" notation at child end (crow's foot) -->
    <path d="M 210 445 L 220 435 L 230 445 M 220 445 L 220 433" stroke="#94a3b8" stroke-width="1.6" fill="none"/>
    <!-- relationship label -->
    <g transform="translate(310, 392)">
      <rect x="-32" y="-12" width="64" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="0" y="2" text-anchor="middle" class="legend-text" font-weight="600">1 — N</text>
    </g>

    <!-- Session → Alert (1 — N) -->
    <path d="M 620 340 L 620 400 L 880 400 L 880 445" class="conn"/>
    <line x1="615" y1="340" x2="625" y2="340" stroke="#94a3b8" stroke-width="1.6"/>
    <path d="M 870 445 L 880 435 L 890 445 M 880 445 L 880 433" stroke="#94a3b8" stroke-width="1.6" fill="none"/>
    <g transform="translate(790, 392)">
      <rect x="-32" y="-12" width="64" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="0" y="2" text-anchor="middle" class="legend-text" font-weight="600">1 — N</text>
    </g>

    <!-- ============== Legend ============== -->
    <g transform="translate(120, 730)">
      <rect x="-20" y="-22" width="860" height="36" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
      <!-- Primary Key -->
      <text x="6" y="-1" fill="#f59e0b" font-size="14">⚷</text>
      <text x="22" y="2" class="legend-text">Primary Key</text>
      <!-- Foreign Key -->
      <text x="138" y="-1" fill="#3b82f6" font-size="14">⚭</text>
      <text x="156" y="2" class="legend-text">Foreign Key</text>
      <!-- One -->
      <line x1="270" y1="-7" x2="270" y2="11" stroke="#475569" stroke-width="1.6"/>
      <text x="282" y="2" class="legend-text">One (mandatory)</text>
      <!-- Many -->
      <path d="M 432 2 L 422 -8 M 432 2 L 422 12 M 432 2 L 422 2" stroke="#475569" stroke-width="1.6" fill="none"/>
      <text x="442" y="2" class="legend-text">Many</text>
      <!-- Cascade -->
      <text x="540" y="2" class="legend-text" font-weight="600" fill="#dc2626">ON DELETE CASCADE</text>
      <text x="700" y="2" class="legend-text">— children removed with parent</text>
    </g>
  </svg>