<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" font-family="'Inter', system-ui, sans-serif">
  <rect width="1500" height="1500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="750" y="70" text-anchor="middle" font-size="42" font-weight="800" fill="#0f172a">NeuroGuard — Entity Relationship Diagram</text>
  <text x="750" y="112" text-anchor="middle" font-size="22" fill="#64748b" letter-spacing="3" font-weight="600">CHEN NOTATION  ·  ENTITIES  ·  ATTRIBUTES  ·  RELATIONSHIPS</text>

  <!-- ============ SESSION ATTRIBUTES (top, 2 rows of large ellipses) ============ -->
  <!-- Row 1: session_id (PK), user_name, session_type, model_type -->
  <g>
    <line x1="190" y1="225" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="190" cy="210" rx="115" ry="42" fill="#ffffff" stroke="#16a34a" stroke-width="3.5"/>
    <text x="190" y="220" text-anchor="middle" font-size="24" fill="#15803d" font-weight="800" text-decoration="underline">session_id</text>
  </g>
  <g>
    <line x1="437" y1="225" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="437" cy="210" rx="115" ry="42" fill="#ffffff" stroke="#a855f7" stroke-width="2.4"/>
    <text x="437" y="220" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">user_name</text>
  </g>
  <g>
    <line x1="687" y1="225" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="687" cy="210" rx="115" ry="42" fill="#ffffff" stroke="#a855f7" stroke-width="2.4"/>
    <text x="687" y="220" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">session_type</text>
  </g>
  <g>
    <line x1="937" y1="225" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="937" cy="210" rx="115" ry="42" fill="#ffffff" stroke="#a855f7" stroke-width="2.4"/>
    <text x="937" y="220" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">model_type</text>
  </g>
  <!-- Row 2: status, started_at, ended_at -->
  <g>
    <line x1="437" y1="320" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="437" cy="305" rx="115" ry="42" fill="#ffffff" stroke="#a855f7" stroke-width="2.4"/>
    <text x="437" y="315" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">status</text>
  </g>
  <g>
    <line x1="1062" y1="320" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="1062" cy="305" rx="115" ry="42" fill="#ffffff" stroke="#a855f7" stroke-width="2.4"/>
    <text x="1062" y="315" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">started_at</text>
  </g>
  <g>
    <line x1="1310" y1="225" x2="750" y2="395" stroke="#7c3aed" stroke-width="2.4"/>
    <ellipse cx="1310" cy="210" rx="115" ry="42" fill="#ffffff" stroke="#a855f7" stroke-width="2.4"/>
    <text x="1310" y="220" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">ended_at</text>
  </g>

  <!-- ============ SESSION ENTITY (center) ============ -->
  <g>
    <rect x="585" y="395" width="330" height="135" rx="10" fill="#a855f7" opacity="0.10"/>
    <rect x="585" y="395" width="330" height="135" rx="10" fill="none" stroke="#a855f7" stroke-width="4"/>
    <text x="750" y="478" text-anchor="middle" font-size="40" font-weight="800" fill="#7c3aed" letter-spacing="1">Session</text>
  </g>

  <!-- ============ RELATIONSHIP LINES + CARDINALITY ============ -->
  <!-- Session → RECORDS -->
  <line x1="685" y1="530" x2="565" y2="690" stroke="#94a3b8" stroke-width="2.4"/>
  <g><circle cx="640" cy="600" r="22" fill="#ffffff" stroke="#475569" stroke-width="2"/>
     <text x="640" y="608" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">1</text></g>
  <!-- RECORDS → FatigueMetric -->
  <line x1="535" y1="780" x2="420" y2="900" stroke="#94a3b8" stroke-width="2.4"/>
  <g><circle cx="445" cy="868" r="22" fill="#ffffff" stroke="#475569" stroke-width="2"/>
     <text x="445" y="876" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">N</text></g>
  <!-- Session → TRIGGERS -->
  <line x1="815" y1="530" x2="935" y2="690" stroke="#94a3b8" stroke-width="2.4"/>
  <g><circle cx="860" cy="600" r="22" fill="#ffffff" stroke="#475569" stroke-width="2"/>
     <text x="860" y="608" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">1</text></g>
  <!-- TRIGGERS → Alert -->
  <line x1="965" y1="780" x2="1080" y2="900" stroke="#94a3b8" stroke-width="2.4"/>
  <g><circle cx="1055" cy="868" r="22" fill="#ffffff" stroke="#475569" stroke-width="2"/>
     <text x="1055" y="876" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">N</text></g>

  <!-- ============ RELATIONSHIP DIAMONDS ============ -->
  <g>
    <polygon points="430,735 565,690 700,735 565,780" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="565" y="745" text-anchor="middle" font-size="22" font-weight="800" fill="#7c2d12" letter-spacing="0.6">RECORDS</text>
  </g>
  <g>
    <polygon points="800,735 935,690 1070,735 935,780" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="935" y="745" text-anchor="middle" font-size="22" font-weight="800" fill="#7c2d12" letter-spacing="0.6">TRIGGERS</text>
  </g>

  <!-- ============ CHILD ENTITIES ============ -->
  <!-- FatigueMetric -->
  <g>
    <rect x="200" y="900" width="380" height="135" rx="10" fill="#10b981" opacity="0.10"/>
    <rect x="200" y="900" width="380" height="135" rx="10" fill="none" stroke="#10b981" stroke-width="4"/>
    <text x="390" y="983" text-anchor="middle" font-size="36" font-weight="800" fill="#059669" letter-spacing="1">FatigueMetric</text>
  </g>
  <!-- Alert -->
  <g>
    <rect x="920" y="900" width="380" height="135" rx="10" fill="#f97316" opacity="0.10"/>
    <rect x="920" y="900" width="380" height="135" rx="10" fill="none" stroke="#f97316" stroke-width="4"/>
    <text x="1110" y="983" text-anchor="middle" font-size="36" font-weight="800" fill="#ea580c" letter-spacing="1">Alert</text>
  </g>

  <!-- ============ FATIGUEMETRIC ATTRIBUTES (2 rows) ============ -->
  <!-- Row 1 -->
  <g>
    <line x1="120" y1="1185" x2="390" y2="1035" stroke="#10b981" stroke-width="2.4"/>
    <ellipse cx="120" cy="1185" rx="105" ry="40" fill="#ffffff" stroke="#16a34a" stroke-width="3.5"/>
    <text x="120" y="1195" text-anchor="middle" font-size="22" fill="#15803d" font-weight="800" text-decoration="underline">metric_id</text>
  </g>
  <g>
    <line x1="350" y1="1185" x2="390" y2="1035" stroke="#10b981" stroke-width="2.4"/>
    <ellipse cx="350" cy="1185" rx="105" ry="40" fill="#ffffff" stroke="#10b981" stroke-width="2.4"/>
    <text x="350" y="1195" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">ear</text>
  </g>
  <g>
    <line x1="580" y1="1185" x2="390" y2="1035" stroke="#10b981" stroke-width="2.4"/>
    <ellipse cx="580" cy="1185" rx="105" ry="40" fill="#ffffff" stroke="#10b981" stroke-width="2.4"/>
    <text x="580" y="1195" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">perclos</text>
  </g>
  <!-- Row 2 -->
  <g>
    <line x1="120" y1="1290" x2="390" y2="1035" stroke="#10b981" stroke-width="2.4"/>
    <ellipse cx="120" cy="1290" rx="105" ry="40" fill="#ffffff" stroke="#10b981" stroke-width="2.4"/>
    <text x="120" y="1300" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">blink_rate</text>
  </g>
  <g>
    <line x1="350" y1="1290" x2="390" y2="1035" stroke="#10b981" stroke-width="2.4"/>
    <ellipse cx="350" cy="1290" rx="105" ry="40" fill="#ffffff" stroke="#10b981" stroke-width="2.4"/>
    <text x="350" y="1300" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">fatigue_state</text>
  </g>
  <g>
    <line x1="580" y1="1290" x2="390" y2="1035" stroke="#10b981" stroke-width="2.4"/>
    <ellipse cx="580" cy="1290" rx="105" ry="40" fill="#ffffff" stroke="#10b981" stroke-width="2.4"/>
    <text x="580" y="1300" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">timestamp</text>
  </g>

  <!-- ============ ALERT ATTRIBUTES (2 rows) ============ -->
  <!-- Row 1 -->
  <g>
    <line x1="920" y1="1185" x2="1110" y2="1035" stroke="#f97316" stroke-width="2.4"/>
    <ellipse cx="920" cy="1185" rx="105" ry="40" fill="#ffffff" stroke="#16a34a" stroke-width="3.5"/>
    <text x="920" y="1195" text-anchor="middle" font-size="22" fill="#15803d" font-weight="800" text-decoration="underline">alert_id</text>
  </g>
  <g>
    <line x1="1150" y1="1185" x2="1110" y2="1035" stroke="#f97316" stroke-width="2.4"/>
    <ellipse cx="1150" cy="1185" rx="105" ry="40" fill="#ffffff" stroke="#f97316" stroke-width="2.4"/>
    <text x="1150" y="1195" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">alert_type</text>
  </g>
  <g>
    <line x1="1380" y1="1185" x2="1110" y2="1035" stroke="#f97316" stroke-width="2.4"/>
    <ellipse cx="1380" cy="1185" rx="105" ry="40" fill="#ffffff" stroke="#f97316" stroke-width="2.4"/>
    <text x="1380" y="1195" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">message</text>
  </g>
  <!-- Row 2 -->
  <g>
    <line x1="920" y1="1290" x2="1110" y2="1035" stroke="#f97316" stroke-width="2.4"/>
    <ellipse cx="920" cy="1290" rx="105" ry="40" fill="#ffffff" stroke="#f97316" stroke-width="2.4"/>
    <text x="920" y="1300" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">ear</text>
  </g>
  <g>
    <line x1="1150" y1="1290" x2="1110" y2="1035" stroke="#f97316" stroke-width="2.4"/>
    <ellipse cx="1150" cy="1290" rx="105" ry="40" fill="#ffffff" stroke="#f97316" stroke-width="2.4"/>
    <text x="1150" y="1300" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">perclos</text>
  </g>
  <g>
    <line x1="1380" y1="1290" x2="1110" y2="1035" stroke="#f97316" stroke-width="2.4"/>
    <ellipse cx="1380" cy="1290" rx="105" ry="40" fill="#ffffff" stroke="#f97316" stroke-width="2.4"/>
    <text x="1380" y="1300" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">timestamp</text>
  </g>

  <!-- ============ LEGEND (bottom) ============ -->
  <g transform="translate(60, 1430)">
    <rect x="0" y="0" width="1380" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
    <!-- Entity -->
    <rect x="40" y="16" width="36" height="26" rx="4" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <text x="92" y="36" font-size="20" fill="#334155" font-weight="600">Entity</text>
    <!-- Attribute -->
    <ellipse cx="220" cy="29" rx="26" ry="16" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <text x="258" y="36" font-size="20" fill="#334155" font-weight="600">Attribute</text>
    <!-- Primary Key -->
    <ellipse cx="408" cy="29" rx="26" ry="16" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <text x="397" y="36" font-size="16" fill="#15803d" font-weight="800" text-decoration="underline">pk</text>
    <text x="446" y="36" font-size="20" fill="#334155" font-weight="600">Primary Key</text>
    <!-- Relationship -->
    <polygon points="618,29 642,11 666,29 642,47" fill="#fef3c7" stroke="#d97706" stroke-width="2.4"/>
    <text x="686" y="36" font-size="20" fill="#334155" font-weight="600">Relationship</text>
    <!-- Cardinality -->
    <text x="880" y="36" font-size="22" font-weight="800" fill="#0f172a">1 : N</text>
    <text x="940" y="36" font-size="20" fill="#334155" font-weight="600">One-to-Many</text>
    <!-- Connector line -->
    <line x1="1170" y1="29" x2="1228" y2="29" stroke="#94a3b8" stroke-width="2.4"/>
    <text x="1244" y="36" font-size="20" fill="#334155" font-weight="600">Connector</text>
  </g>
</svg>
