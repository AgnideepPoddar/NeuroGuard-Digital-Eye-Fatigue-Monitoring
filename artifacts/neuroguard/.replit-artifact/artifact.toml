kind = "web"
previewPath = "/"
title = "NeuroGuard - Eye Fatigue Monitor"
version = "1.0.0"
id = "artifacts/neuroguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21581
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/neuroguard run dev"

[services.env]
PORT = "21581"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/neuroguard", "run", "build"]
publicDir = "artifacts/neuroguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
